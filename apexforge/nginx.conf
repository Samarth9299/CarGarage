server {
    listen 80;
    server_name your-domain.com www.your-domain.com;  # replace with your domain or EC2 IP

    root /var/www/apexforge;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/css application/javascript image/svg+xml text/html;
    gzip_comp_level 6;

    # Cache static assets
    location ~* \.(css|js|svg|ico|png|jpg|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # HTML — no-cache so updates are instant
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store";
    }

    # SPA fallback — serve index.html for any unknown route
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Block dotfiles
    location ~ /\. { deny all; }
}
