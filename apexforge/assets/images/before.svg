<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#533483;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  <!-- Ground shadow -->
  <ellipse cx="200" cy="175" rx="160" ry="12" fill="rgba(0,0,0,0.4)"/>
  <!-- Car body lower -->
  <rect x="50" y="120" width="300" height="45" rx="8" fill="url(#bodyGrad)" stroke="#334" stroke-width="1"/>
  <!-- Car body upper -->
  <path d="M110,120 L150,75 L260,72 L300,120 Z" fill="url(#bodyGrad)" stroke="#334" stroke-width="1"/>
  <!-- Windshield -->
  <path d="M155,118 L165,80 L245,80 L255,118 Z" fill="url(#glassGrad)" stroke="#0f3460" stroke-width="1"/>
  <!-- Front bumper detail -->
  <rect x="52" y="140" width="60" height="18" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
  <!-- Rear bumper detail -->
  <rect x="288" y="140" width="60" height="18" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
  <!-- Front wheel -->
  <circle cx="120" cy="160" r="25" fill="#0a0a0a" stroke="#333" stroke-width="2"/>
  <circle cx="120" cy="160" r="16" fill="#1a1a1a" stroke="#444" stroke-width="1.5"/>
  <circle cx="120" cy="160" r="6" fill="#333"/>
  <!-- Rear wheel -->
  <circle cx="280" cy="160" r="25" fill="#0a0a0a" stroke="#333" stroke-width="2"/>
  <circle cx="280" cy="160" r="16" fill="#1a1a1a" stroke="#444" stroke-width="1.5"/>
  <circle cx="280" cy="160" r="6" fill="#333"/>
  <!-- Headlight -->
  <ellipse cx="68" cy="130" rx="12" ry="7" fill="#ccddff" opacity="0.6"/>
  <!-- Taillight -->
  <ellipse cx="332" cy="130" rx="12" ry="7" fill="#ff2a2a" opacity="0.5"/>
  <!-- Label -->
  <text x="200" y="30" text-anchor="middle" fill="#7a8aa0" font-family="monospace" font-size="13" letter-spacing="3">STOCK</text>
</svg>
